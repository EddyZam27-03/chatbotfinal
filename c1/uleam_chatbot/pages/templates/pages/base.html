{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}ULEAM{% endblock %}</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* Estilos para las tablas que genere el Bot */
    .bot-response table {
      width: 100%;
      margin: 15px 0;
      border-collapse: collapse;
      background-color: white;
      color: #333;
    }
    .bot-response th, .bot-response td {
      border: 1px solid #dee2e6;
      padding: 10px;
      font-size: 0.9rem;
    }
    .bot-response th {
      background-color: #f8f9fa;
      font-weight: bold;
    }
    .bot-response ul, .bot-response ol {
      padding-left: 20px;
    }
  </style>
</head>
<body>

  <nav id="mainNav" class="navbar navbar-expand-lg navbar-dark fixed-top py-2">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="/">
        <img src="{% static 'img/uleam_logo.png' %}" alt="logo" height="48" class="me-2">
        <span class="fw-bold">ULEAM — Ext. El Carmen</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navCol">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navCol">
        <ul class="navbar-nav ms-auto text-center">
          <li class="nav-item"><a href="/" class="nav-link"><i class="bi bi-house"></i> Inicio</a></li>
          <li class="nav-item"><a href="/chatbot/" class="nav-link"><i class="bi bi-robot"></i> Chatbot</a></li>
          <li class="nav-item"><a href="/faq/" class="nav-link"><i class="bi bi-patch-question"></i> Preguntas</a></li>
          <li class="nav-item"><a href="/contact/" class="nav-link"><i class="bi bi-envelope"></i> Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="pt-5 mt-4">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer-site text-center text-white bg-dark mt-4">
    <p class="m-0 py-3 small">© 2025 ULEAM — Chatbot Académico • Desarrollado por Maykel Santos</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const nav = document.getElementById("mainNav");
    window.addEventListener("scroll", () => {
      if (window.scrollY > 50) nav.classList.add("scrolled");
      else nav.classList.remove("scrolled");
    });
  </script>
</body>
</html>
